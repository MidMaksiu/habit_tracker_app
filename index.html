<!DOCTYPE html>
<html>
    <head>
        <title> Planner ver 0.0.1</title>

        <link rel="stylesheet" href="style.css">
        <!-- Using bootstrap for this project-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Meta data--->
        <meta http-equiv=”en” name="Habit tracker and to-do list app" name="MidMaksiu" name="HandheldFriendly" content="true"/>
    </head>
    <body>

        <!-- Top title and display of current date -->
         <div class="container-fluid py-4">
            <div class="row justify-content-center">
                <div class="col-md-4 text-center">
                <h1 class="mb-1 display-5" id="titleText">Keep up the good work!</h1>
                <span class="text-muted" id="current-date"></span>
                </div>
            </div>
            <!-- Progress bar -->
            <div class="row justify-content-center mt-3 align-items-center">
  <div class="col-auto">
    <button class="btn btn-outline-secondary btn-sm" id="prev-day-btn">◀</button>
  </div>
  <div class="col-md-4 d-flex align-items-center gap-3 border rounded p-3">
    <span id="progress">Progress</span>
    <div class="progress flex-grow-1" style="height: 8px;">
      <div class="progress-bar" id="habit-progress" role="progressbar" style="width: 0%"></div>
    </div>
  </div>
  <div class="col-auto">
    <button class="btn btn-outline-secondary btn-sm" id="next-day-btn">▶</button>
  </div>
</div>
        </div>

    <!-- Definiton of container for both cards -->
    <div class="container-fluid py-4">
        <div class="row g-4">

    <!-- Lewa kolumna: Habit Tracker + To-Do -->
        <div class="col-12 col-md-6 d-flex flex-column gap-3">
            
            <!-- Habit Tracker -->
            <div class="card">
                <div class="card-header">
                <h5 class="mb-0"><b>🔁 Habit Tracker</b></h5>
                </div>
                <div class="card-body">
                <div id="habits-list"></div>
                <button class="btn btn-success btn-sm mt-3" id="add-habit-btn">+ Add</button>
                <button class="btn btn-danger btn-sm mt-3" id="del-habit-btn">- Delete</button>
            </div>
        </div>

        <!-- To-Do -->
        <div class="card">
            <div class="card-header">
            <h5 class="mb-0"><b>✅ To-Do</b></h5>
            </div>
            <div class="card-body">
            <div id="task-list"></div>
            <button class="btn btn-success btn-sm mt-3" id="add-task-btn">+ Add</button>
            <button class="btn btn-danger btn-sm mt-3" id="del-task-btn">- Delete</button>
            </div>
        </div>

    </div>

    <!-- Wins of the day -->
    <div class="col-12 col-md-6">
      <div class="card h-100">
        <div class="card-header">
          <h5 class="mb-0"><b>🏆 Wins of the day</b></h5>
        </div>
        <div class="card-body d-flex flex-column">
            <div id="wins-list" class="mb-3"></div>
                <div class="d-flex gap-2 mt-auto">
                    <input type="text" class="form-control" id="win-input" placeholder="Enter todays win">
                    <button class="btn btn-success" id="add-win-btn">+</button>
                </div>
            </div>
      </div>
    </div>

  </div>
</div>
        <!-- Page for adding habit after button click -->
        <div class="modal fade" id="AddModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Item </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                    <label class="form-label">Name: </label>
                    <input type="hidden" id="modal-type" value="">
                    <input type="text" class="form-control" id="habit-name-input" placeholder="np. Drink Water">
                    </div>
                    <div class="mb-3">
                    <label class="form-label">Color</label>
                    <input type="color" class="form-control form-control-color" id="habit-color-input" value="#0d6efd">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-habit-btn">Save</button>
                </div>
                </div>
            </div>
        </div>


        
        <!-- App Script linked-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
